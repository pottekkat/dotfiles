# Start numbering from 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g mouse on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g allow-passthrough on

# Handle session destruction gracefully
set-hook -g session-closed 'run-shell "sleep 0.1"'

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Popup terminal
bind g display-popup -d "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Theme
set -g @plugin 'pottekkat/tmux-minimal-theme'
set -g @minimal_theme_session_icon ""

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'

# tmux-resurrect: restore vim/neovim sessions (requires tpope/vim-obsession in vim/neovim)
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'

# tmux-resurrect: restore pane contents
set -g @resurrect-capture-pane-contents 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
